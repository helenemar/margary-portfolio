<!doctype html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hélène Margary · portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{--bg:#15130E;--bg2:#0F0D09;--surface:#1E1B15;--elev:#262219;--text:#ECE7DC;--muted:#9A938A;--faint:#6E685E;
    --hair:rgba(236,231,220,.13);--hair2:rgba(236,231,220,.06);--dot:rgba(236,231,220,.05);--shadow:rgba(0,0,0,.6);--live:#8FA886;--note:#2A2619;--cardred:#C2776B;--sel:#7C8FB8;}
  :root[data-theme="light"]{--bg:#E4DFD4;--bg2:#D8D2C6;--surface:#EFEBE3;--elev:#FBF9F4;--text:#1C1A15;--muted:#7A7468;--faint:#A49C90;
    --hair:rgba(28,26,21,.16);--hair2:rgba(28,26,21,.06);--dot:rgba(28,26,21,.07);--shadow:rgba(54,48,38,.20);--live:#5E7556;--note:#F2E9C9;--cardred:#B0584A;--sel:#5B73A6;}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;user-select:none;transition:background .5s,color .5s}
  .mono{font-family:"JetBrains Mono",monospace}
  button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}

  /* viewport + world */
  #viewport{position:fixed;inset:0;overflow:hidden;cursor:grab;
    background-image:radial-gradient(var(--dot) 1px,transparent 1.4px);background-size:30px 30px;background-color:var(--bg)}
  #viewport.grabbing{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

  .frame{position:absolute;animation:flo 8s ease-in-out infinite;--acc:var(--sel)}
  .flabel::before{content:"";display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--acc);margin-right:8px;vertical-align:0px}
  .frame:nth-child(2n){animation-duration:10s;animation-delay:-2s}
  .frame:nth-child(3n){animation-duration:7s;animation-delay:-4s}
  @keyframes flo{0%,100%{translate:0 0}50%{translate:0 -7px}}
  .flabel{position:absolute;top:-24px;left:2px;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted);white-space:nowrap;letter-spacing:.02em}
  .flabel b{color:var(--text);font-weight:500}
  .fbox{position:absolute;inset:0;top:0;border-radius:10px;background:var(--elev);border:1px solid var(--hair);overflow:hidden;
    box-shadow:0 30px 70px -28px var(--shadow);transition:box-shadow .2s,outline-color .15s;outline:2px solid transparent;outline-offset:3px}
  .frame:hover .fbox{outline-color:var(--acc);box-shadow:0 30px 70px -28px var(--shadow),0 0 0 4px color-mix(in srgb,var(--acc) 16%,transparent)}
  .frame:hover .dims{opacity:1}
  .dims{position:absolute;left:50%;bottom:-26px;transform:translateX(-50%);background:var(--acc);color:#fff;font-family:"JetBrains Mono",monospace;font-size:11px;padding:2px 7px;border-radius:4px;opacity:0;transition:opacity .15s;white-space:nowrap}

  /* frame content */
  .pad{padding:18px}
  .ftitle{font-family:"Fraunces",serif;font-weight:700;font-size:1.5rem;line-height:1.18;margin:0 0 6px}
  .fbrand{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .fdesc{font-size:.92rem;line-height:1.5;color:var(--muted);margin:12px 0 0}
  .ftags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .ftags span{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.05em;border:1px solid color-mix(in srgb,var(--acc) 50%,var(--hair));border-radius:999px;padding:4px 9px;color:color-mix(in srgb,var(--acc) 70%,var(--text));background:color-mix(in srgb,var(--acc) 12%,transparent)}
  .shot{height:150px;border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--hair);margin-top:14px}
  .avatar3d{width:150px;height:150px;margin:2px auto 0;perspective:760px}
  .av3d-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .15s ease-out;will-change:transform}
  .avring{position:absolute;inset:-7px;border-radius:50%;background:conic-gradient(from 0deg,#F24E1E,#FF7262,#A259FF,#1ABCFE,#0ACF83,#F24E1E);transform:translateZ(-12px);animation:avspin 9s linear infinite}
  @keyframes avspin{to{transform:translateZ(-12px) rotate(360deg)}}
  .avdisc{position:absolute;inset:0;border-radius:50%;overflow:hidden;border:4px solid var(--elev);transform:translateZ(22px);box-shadow:0 20px 44px -18px var(--shadow)}
  .avdisc img{width:100%;height:100%;object-fit:cover;display:block}

  /* faux UI */
  .fx{position:absolute;inset:0;background:#F2EEE6;color:#1C1A15}
  .fx .l{height:5px;border-radius:3px;background:#A49C90;opacity:.45}.fx .l.t{opacity:.26}
  .fx .top{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid rgba(0,0,0,.08)}.fx .top .o{width:6px;height:6px;border-radius:50%;background:#A49C90}
  .fx .gr{display:flex;height:calc(100% - 26px)}.fx .sd{width:24%;border-right:1px solid rgba(0,0,0,.08);padding:10px 9px;display:flex;flex-direction:column;gap:8px}
  .fx .mn{flex:1;padding:11px}.fx .cd{display:flex;gap:7px;margin-bottom:11px}.fx .c2{flex:1;border:1px solid rgba(0,0,0,.08);border-radius:7px;padding:8px}
  .fx .big{height:13px;width:60%;border-radius:4px;background:#1C1A15;opacity:.8;margin-top:7px}.fx .ch{height:40px;border:1px solid rgba(0,0,0,.08);border-radius:7px;padding:6px}
  .fx.site .nav{display:flex;align-items:center;gap:8px;padding:9px 12px}.fx.site .lg{font-family:"Fraunces",serif;font-weight:700;font-size:12px}.fx.site .sp{flex:1}
  .fx.site .h{height:14px;border-radius:4px;background:#1C1A15;opacity:.85;margin:6px 14px}.fx.site .pl{display:inline-block;height:14px;width:50px;border-radius:8px;background:#1C1A15;opacity:.85;margin:6px 0 0 14px}
  .fx.site .tr{display:flex;gap:7px;padding:10px 14px}.fx.site .tc{flex:1;height:36px;border:1px solid rgba(0,0,0,.08);border-radius:7px}
  .fx.ai{background:#1B1915;color:#E7E2D8}.fx.ai .bub{margin:9px 11px;border-radius:9px;padding:7px 9px;max-width:70%}
  .fx.ai .bub.me{margin-left:auto;background:rgba(255,255,255,.10)}.fx.ai .bub.ai2{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
  .fx.ai .l{background:#fff;opacity:.18}

  /* about / skills / brands / arcade */
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chips span{font-family:"JetBrains Mono",monospace;font-size:10px;border:1px solid var(--hair);border-radius:999px;padding:4px 9px;color:var(--muted)}
  .blist{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .blist div{font-family:"Fraunces",serif;font-weight:600;font-size:1.25rem;border-bottom:1px solid var(--hair);padding-bottom:8px}
  .skl{list-style:none;margin:8px 0 0;padding:0;display:grid;gap:8px}
  .skl li{display:flex;gap:9px;font-size:.92rem;color:var(--muted)}.skl li::before{content:"→";color:var(--text)}
  .arc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .arcbtn{display:flex;align-items:center;gap:9px;border:1px solid var(--hair);border-radius:10px;padding:12px;cursor:pointer;background:var(--surface);transition:.15s;font-family:"JetBrains Mono",monospace;font-size:12px}
  .arcbtn:hover{border-color:var(--text);transform:translateY(-2px)}
  .arcbtn .g{font-size:18px;font-weight:700}
  .links{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .links a{font-family:"JetBrains Mono",monospace;font-size:12px;text-decoration:none;color:var(--bg);background:var(--text);border-radius:999px;padding:9px 14px}

  /* comment pins */
  .pin{position:absolute;width:30px;height:30px;border-radius:50% 50% 50% 2px;background:color-mix(in srgb,var(--acc) 18%,var(--elev));border:1px solid color-mix(in srgb,var(--acc) 60%,var(--hair));--acc:var(--sel);display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px -8px var(--shadow);font-size:13px;cursor:pointer;transition:transform .15s;z-index:5}
  .pin:hover{transform:scale(1.15)}
  .pin .bubble{position:absolute;left:36px;top:-4px;width:170px;background:var(--elev);border:1px solid var(--hair);border-radius:8px;padding:9px 11px;font-size:.8rem;color:var(--muted);line-height:1.4;opacity:0;pointer-events:none;transition:.15s;box-shadow:0 12px 30px -12px var(--shadow)}
  .pin:hover .bubble{opacity:1}
  .pin .who{display:block;font-family:"JetBrains Mono",monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text);margin-bottom:3px}

  /* multiplayer cursors */
  #cursors{position:fixed;inset:0;z-index:40;pointer-events:none}
  .cursor{position:absolute;top:0;left:0;will-change:transform}
  .cursor svg{width:20px;height:20px;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
  .cursor .flag{position:absolute;left:15px;top:15px;background:currentColor;color:#fff;font-family:"JetBrains Mono",monospace;font-size:10px;padding:2px 7px;border-radius:5px 5px 5px 1px;white-space:nowrap}
  .cursor .say{position:absolute;left:15px;top:38px;background:var(--elev);color:var(--text);border:1px solid var(--hair);font-size:11px;padding:5px 9px;border-radius:8px;white-space:nowrap;opacity:0;transition:opacity .25s;font-family:"Inter",sans-serif}
  .cursor.talk .say{opacity:1}

  /* top bar */
  #bar{position:fixed;top:0;left:0;right:0;height:44px;z-index:60;display:flex;align-items:center;gap:14px;padding:0 16px;
    background:color-mix(in srgb,var(--bg) 70%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--hair);
    font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  #bar .logo{color:var(--text);font-weight:700}
  #bar .file{color:var(--muted)} #bar .sp{flex:1}
  #bar .avatars{display:flex}#bar .avatars .av{width:24px;height:24px;border-radius:50%;border:2px solid var(--bg);margin-left:-7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
  .tbtn{display:inline-flex;align-items:center;gap:7px;color:var(--muted);cursor:pointer;border:1px solid transparent;border-radius:999px;padding:5px 11px;transition:.2s}
  .tbtn:hover{color:var(--text);border-color:var(--hair)}.tbtn.solid{background:var(--text);color:var(--bg)}

  /* zoom controls */
  #zoomc{position:fixed;left:16px;bottom:16px;z-index:60;display:flex;align-items:center;gap:2px;background:color-mix(in srgb,var(--surface) 80%,transparent);backdrop-filter:blur(12px);border:1px solid var(--hair);border-radius:11px;padding:4px}
  #zoomc button{width:34px;height:30px;border-radius:8px;color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center}
  #zoomc button:hover{background:color-mix(in srgb,var(--text) 10%,transparent)}
  #zoomc .pct{min-width:50px;text-align:center;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  #hintbar{position:fixed;left:16px;bottom:64px;z-index:55;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);letter-spacing:.03em}

  #palettes{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:62;display:flex;gap:4px;background:color-mix(in srgb,var(--surface) 82%,transparent);backdrop-filter:blur(14px);border:1px solid var(--hair);border-radius:13px;padding:5px}
  .pal{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:9px;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);transition:.15s}
  .pal:hover{color:var(--text)}.pal.active{background:color-mix(in srgb,var(--text) 12%,transparent);color:var(--text)}
  .pal .sw{display:flex}.pal .sw i{width:11px;height:11px;border-radius:3px;margin-left:-3px;border:1.5px solid var(--surface)}.pal .sw i:first-child{margin-left:0}
  @media(max-width:680px){#hintbar{display:none}.pal span{display:none}}

  /* window manager + games (Arcade) */
  .window{position:fixed;background:var(--elev);border-radius:13px;overflow:hidden;box-shadow:0 40px 90px -22px var(--shadow),0 0 0 1px var(--hair);z-index:100;animation:pop .26s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes pop{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:none}}
  .wbar{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:1px solid var(--hair);background:color-mix(in srgb,var(--text) 4%,var(--surface));cursor:grab;touch-action:none}
  .wdot{width:9px;height:9px;border-radius:50%;background:var(--faint);opacity:.6}.wdot.c{background:var(--muted);opacity:.9;cursor:pointer}.wdot.c:hover{background:var(--text)}
  .wtitle{margin-left:6px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted)}
  .game{display:flex}.game canvas{display:block;background:var(--bg2)}
  .ginfo{padding:14px 16px;width:130px;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted)}
  .ginfo .gscore{font-family:"Fraunces",serif;font-size:1.9rem;color:var(--text);margin:2px 0 16px;line-height:1}.ghint{line-height:1.8;color:var(--faint)}
  .pixwrap{padding:14px;width:320px}.pixhead{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);margin-bottom:10px}.pixhead b{color:var(--text)}.pixoff{color:var(--text)}
  .pixstage{position:relative;height:210px;border:1px solid var(--hair);border-radius:8px;overflow:hidden;background-image:linear-gradient(var(--hair2) 1px,transparent 1px),linear-gradient(90deg,var(--hair2) 1px,transparent 1px);background-size:15px 15px}
  .pixtarget{position:absolute;width:60px;height:60px;border:2px dashed var(--muted);border-radius:6px}.pixblock{position:absolute;width:60px;height:60px;background:var(--text);border-radius:6px;cursor:grab;touch-action:none;transition:background .15s}
  .pixblock.near{background:var(--live)}.pixblock.shipped{background:var(--live)}.pixblock.shake{animation:shk .3s}@keyframes shk{0%,100%{margin-left:0}25%{margin-left:-5px}75%{margin-left:5px}}
  .pixhint{margin-top:10px;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--faint)}
  .sol{padding:12px;width:min(92vw,628px)}.soltop{display:flex;gap:7px;margin-bottom:10px}.solslot{width:42px;height:60px;border-radius:6px;border:1px solid var(--hair);position:relative;flex:none;color:var(--faint);font-family:"JetBrains Mono",monospace;font-size:18px;display:flex;align-items:center;justify-content:center}
  .solspacer{flex:1}.soltab{display:flex;gap:7px}.solcol{flex:1;position:relative;min-height:64px}
  .card{width:42px;height:60px;border-radius:6px;border:1px solid var(--hair);background:var(--elev);position:absolute;left:0;font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:700;padding:4px 5px;cursor:pointer;color:var(--text)}
  .card.red{color:var(--cardred)}.card.down{background:repeating-linear-gradient(45deg,var(--surface),var(--surface) 4px,var(--bg2) 4px,var(--bg2) 8px);cursor:default}.card.sel{outline:2px solid var(--text);outline-offset:1px;z-index:20}
  .solmsg{margin-top:10px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--live);min-height:14px}

  #boot{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text);transition:opacity .6s}
  #boot .logo{font-family:"Fraunces",serif;font-weight:900;font-size:2rem}#boot .load{width:150px;height:2px;background:var(--hair);overflow:hidden}#boot .load i{display:block;height:100%;width:0;background:var(--text);animation:load 1.2s ease forwards}@keyframes load{to{width:100%}}#boot .sub{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.2em;color:var(--muted)}

  .meav{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid var(--hair);margin-right:-6px}
  .gthumbs{display:flex;gap:8px;margin-top:8px}
  .gthumbs img{width:50%;height:74px;object-fit:cover;border-radius:7px;border:1px solid var(--hair)}
  .glink{display:inline-block;margin-top:12px;font-family:"JetBrains Mono",monospace;font-size:12px;text-decoration:none;color:var(--bg);background:var(--acc);border-radius:999px;padding:8px 13px}
  .shot img{width:100%;height:100%;object-fit:cover;display:block}

  /* chatbot */
  #chatbtn{position:fixed;right:20px;bottom:20px;z-index:120;cursor:pointer}
  #chatbtn .avatar3d{width:64px;height:64px;perspective:420px;margin:0}
  #chatbtn .avdisc{border-width:3px}
  #chatbtn .label{position:absolute;right:74px;top:50%;transform:translateY(-50%);background:var(--elev);border:1px solid var(--hair);color:var(--text);font-family:"JetBrains Mono",monospace;font-size:11px;padding:7px 11px;border-radius:10px;white-space:nowrap;box-shadow:0 10px 26px -12px var(--shadow);transition:opacity .2s}
  #chatbtn.open .label{opacity:0;pointer-events:none}
  #chatpanel{position:fixed;right:20px;bottom:96px;z-index:121;width:min(92vw,330px);background:var(--elev);border:1px solid var(--hair);border-radius:16px;overflow:hidden;box-shadow:0 40px 90px -22px var(--shadow);display:none;flex-direction:column;animation:pop .26s cubic-bezier(.2,.9,.3,1.2)}
  #chatpanel.show{display:flex}
  .chathead{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--hair);background:color-mix(in srgb,var(--text) 4%,var(--surface))}
  .chathav{width:36px;height:36px;border-radius:50%;overflow:hidden;flex:none}
  .bot3d{border-radius:50%;overflow:hidden;background:linear-gradient(160deg,#A6C8F2,#C3B0E6);position:relative;display:flex;align-items:center;justify-content:center}
  .bot3d canvas{display:block;width:100%!important;height:100%!important}
  .botmono{font-family:"Fraunces",serif;font-weight:600;color:#fff;font-size:1rem}
  #botface{width:64px;height:64px;cursor:pointer;box-shadow:0 16px 32px -12px var(--shadow),0 0 0 3px var(--elev),0 0 0 4px var(--hair)}
  #chatbtn{transition:transform .18s}#chatbtn:hover{transform:translateY(-2px) scale(1.04)}
  .chathav svg,.avdisc svg{width:100%;height:100%;display:block}
  .chatname{font-family:"Fraunces",serif;font-weight:600;font-size:1.02rem;display:flex;align-items:center;gap:7px}
  .chatdot{width:7px;height:7px;border-radius:50%;background:#0ACF83;display:inline-block}
  .chatrole{font-family:"JetBrains Mono",monospace;font-size:9.5px;color:var(--muted);letter-spacing:.04em}
  #chatclose{margin-left:auto;color:var(--muted);font-size:16px}#chatclose:hover{color:var(--text)}
  #chatmsgs{padding:14px;display:flex;flex-direction:column;gap:9px;height:280px;overflow-y:auto}
  .cmsg{max-width:84%;font-size:.9rem;line-height:1.45;padding:9px 12px;border-radius:13px}
  .cmsg.bot{align-self:flex-start;background:var(--surface);border:1px solid var(--hair);border-bottom-left-radius:4px}
  .cmsg.me{align-self:flex-end;background:var(--acc);color:#fff;border-bottom-right-radius:4px}
  #chatchips{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px}
  .chip{font-family:"JetBrains Mono",monospace;font-size:10.5px;border:1px solid var(--hair);border-radius:999px;padding:6px 10px;cursor:pointer;color:var(--muted);transition:.15s}
  .chip:hover{border-color:var(--acc);color:var(--text)}
  .chatinput{display:flex;gap:7px;padding:10px 12px;border-top:1px solid var(--hair)}
  #chatin{flex:1;background:var(--surface);border:1px solid var(--hair);border-radius:999px;padding:9px 13px;color:var(--text);font:inherit;font-size:.88rem;outline:none}
  #chatsend{width:36px;border-radius:50%;background:var(--acc);color:#fff;font-size:15px}
  #chatpanel{--acc:#0D99FF}#chatbtn{--acc:#0D99FF}

  .pcover{margin-top:6px;border:1px solid var(--hair);border-radius:10px;overflow:hidden;background:var(--surface)}
  .pcover img{width:100%;height:auto;display:block}
  .pmore{margin-top:13px;font-family:"JetBrains Mono",monospace;font-size:12px;border:1px solid var(--acc);color:var(--acc);background:transparent;border-radius:999px;padding:8px 15px;cursor:pointer;transition:.15s}
  .pmore:hover{background:var(--acc);color:#fff}
  #projModal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:24px;--acc:#0D99FF}
  #projModal.show{display:flex}
  .pm-back{position:absolute;inset:0;background:rgba(20,18,16,.55);backdrop-filter:blur(5px)}

    {t:'Morceau 4', a:'colle ton fichier ici', emoji:'💿', src:''},
    {t:'Morceau 5', a:'colle ton fichier ici', emoji:'📻', src:''}
  ];
  window.HELENE_PLAYLIST=TRACKS;

  function buildMusic(api){
    var body=api.body, vol=0.7, cur=-1, playing=false;
    var audio=new Audio();audio.preload='none';audio.volume=vol;
    var actx,master,genTimer,genNodes;
    function ensureCtx(){if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=vol*0.6;master.connect(actx.destination);}if(actx.state==='suspended')actx.resume();}
    function startGen(){ensureCtx();var filt=actx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=950;filt.connect(master);
      var pad=actx.createGain();pad.gain.value=0;pad.connect(filt);
      var oscs=[130.81,164.81,196.0].map(function(f){var o=actx.createOscillator();o.type='sine';o.frequency.value=f;o.connect(pad);o.start();return o;});
      pad.gain.setTargetAtTime(0.10,actx.currentTime,1.6);
      var scale=[261.63,293.66,329.63,392.0,440.0,523.25];
      genTimer=setInterval(function(){if(Math.random()<0.62){var f=scale[Math.floor(Math.random()*scale.length)];var o=actx.createOscillator();o.type='triangle';o.frequency.value=f;var g=actx.createGain();g.gain.value=0;o.connect(g);g.connect(filt);var n=actx.currentTime;g.gain.linearRampToValueAtTime(0.16,n+0.02);g.gain.exponentialRampToValueAtTime(0.0008,n+1.4);o.start(n);o.stop(n+1.5);}},650);
      genNodes={oscs:oscs,pad:pad};}
    function stopGen(){if(genTimer){clearInterval(genTimer);genTimer=null;}if(genNodes&&actx){try{genNodes.pad.gain.setTargetAtTime(0,actx.currentTime,0.2);var o=genNodes.oscs;setTimeout(function(){o.forEach(function(x){try{x.stop();}catch(e){}});},450);}catch(e){}genNodes=null;}}

    body.innerHTML='<div class="swm-top"><div class="swm-cov">☕</div><div class="swm-meta"><div class="swm-t">—</div><div class="swm-a">—</div></div></div>'
      +'<div class="swm-bar"><i></i></div><div class="swm-time"><span class="swm-cur">0:00</span><span class="swm-dur">0:00</span></div>'
      +'<div class="swm-ctrl"><button class="prev" title="Précédent">&#9198;</button><button class="play" title="Lecture">&#9654;</button><button class="next" title="Suivant">&#9197;</button></div>'
      +'<div class="swm-vol"><span>🔊</span><input type="range" min="0" max="100" value="70"></div>'
      +'<div class="swm-list"></div>'
      +'<div class="swm-hint">👉 Pour mettre tes morceaux : édite <code>window.HELENE_PLAYLIST</code> (titre, artiste, <code>src</code>) ou colle un lien audio. Le 1er est une ambiance générée, sans fichier.</div>';
    var q=function(s){return body.querySelector(s);};
    var cov=q('.swm-cov'),tEl=q('.swm-t'),aEl=q('.swm-a'),bar=q('.swm-bar'),fill=q('.swm-bar i'),tCur=q('.swm-cur'),tDur=q('.swm-dur'),btnPlay=q('.play'),L=q('.swm-list');
    function fmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2);}
    function icon(){btnPlay.innerHTML=playing?'&#10074;&#10074;':'&#9654;';}
    function live(b){bar.classList.toggle('live',b);if(b){tCur.textContent='live';tDur.textContent='∞';fill.style.width='';}else{tCur.textContent='0:00';tDur.textContent='0:00';fill.style.width='0';}}
    function renderList(){L.innerHTML='';TRACKS.forEach(function(k,i){var r=el('div','swm-row'+(i===cur?' act':''));r.innerHTML='<span class="e">'+k.emoji+'</span><span class="nm">'+k.t+' <small>'+k.a+'</small></span>';r.onclick=function(){play(i);};L.appendChild(r);});}
    function setMeta(){var k=TRACKS[cur];cov.textContent=k.emoji;tEl.textContent=k.t;aEl.textContent=k.a;}
    function stopAll(){try{audio.pause();}catch(e){}stopGen();}
    function play(i){stopAll();cur=i;var k=TRACKS[i];setMeta();renderList();
      if(k.gen){live(true);startGen();playing=true;}
      else if(k.src){live(false);audio.src=k.src;audio.currentTime=0;audio.play().catch(function(){});playing=true;}
      else{live(false);aEl.textContent='ajoute un fichier (window.HELENE_PLAYLIST)';playing=false;}
      icon();}
    function toggle(){if(cur<0){play(0);return;}var k=TRACKS[cur];
      if(playing){if(k.gen)stopGen();else audio.pause();playing=false;}
      else{if(k.gen)startGen();else if(k.src)audio.play().catch(function(){});playing=true;}
      icon();}
    audio.addEventListener('timeupdate',function(){if(!audio.duration||bar.classList.contains('live'))return;fill.style.width=(audio.currentTime/audio.duration*100)+'%';tCur.textContent=fmt(audio.currentTime);tDur.textContent=fmt(audio.duration);});
    audio.addEventListener('ended',function(){play((cur+1)%TRACKS.length);});
    bar.addEventListener('click',function(e){if(!audio.duration||bar.classList.contains('live'))return;var r=bar.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;});
    q('.play').onclick=toggle;
    q('.prev').onclick=function(){play((cur<=0?TRACKS.length:cur)-1);};
    q('.next').onclick=function(){play((cur+1)%TRACKS.length);};
    q('.swm-vol input').oninput=function(){vol=this.value/100;audio.volume=vol;if(master)master.gain.value=vol*0.6;};
    renderList();setMeta=setMeta;cur=0;setMeta();renderList();
    api.el.__cleanup=function(){stopAll();};
  }

  /* ===================== MINI TENNIS ===================== */
  function buildTennis(api){
    var body=api.body;
    body.innerHTML='<div class="swt-sc">Toi <b class="me">0</b> &nbsp;—&nbsp; <b class="op">0</b> Adversaire</div><canvas class="swt-c" height="150"></canvas><div class="swt-cap">🎾 Roland Garros (pour de faux). Ça joue tout seul, profite.</div>';
    var cv=body.querySelector('canvas'),ctx=cv.getContext('2d');
    var meEl=body.querySelector('.me'),opEl=body.querySelector('.op');
    var W,H,ball,pl,pr,ph,me=0,op=0,raf,ploff=0,proff=0,tk=0;
    function size(){cv.width=cv.clientWidth||260;cv.height=api.el.classList.contains('lg')?230:150;W=cv.width;H=cv.height;ph=H*0.22;if(!ball)reset(1);}
    function reset(d){ball={x:W/2,y:H/2,vx:2.3*d,vy:(Math.random()*2-1)*1.7};pl={y:H/2};pr={y:H/2};}
    function draw(){ctx.fillStyle='#3f7d4e';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.setLineDash([5,7]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#fff';ctx.fillRect(7,pl.y-ph/2,4,ph);ctx.fillRect(W-11,pr.y-ph/2,4,ph);ctx.fillStyle='#e9ff66';ctx.beginPath();ctx.arc(ball.x,ball.y,4,0,7);ctx.fill();}
    function step(){tk++;if(tk%140===0){ploff=(Math.random()*2-1)*ph*0.9;proff=(Math.random()*2-1)*ph*0.9;}
      ball.x+=ball.vx;ball.y+=ball.vy;if(ball.y<4||ball.y>H-4)ball.vy*=-1;
      pl.y+=Math.max(-2.5,Math.min(2.5,((ball.y+ploff)-pl.y)*0.1));pr.y+=Math.max(-2.5,Math.min(2.5,((ball.y+proff)-pr.y)*0.1));
      if(ball.vx<0&&ball.x<14&&Math.abs(ball.y-pl.y)<ph/2+3){ball.vx=Math.abs(ball.vx)+0.06;ball.vy+=(ball.y-pl.y)*0.05;}
      if(ball.vx>0&&ball.x>W-14&&Math.abs(ball.y-pr.y)<ph/2+3){ball.vx=-(Math.abs(ball.vx)+0.06);ball.vy+=(ball.y-pr.y)*0.05;}
      if(ball.x<-6){op++;opEl.textContent=op;reset(1);}
      if(ball.x>W+6){me++;meEl.textContent=me;reset(-1);}
      draw();raf=requestAnimationFrame(step);}
    size();raf=requestAnimationFrame(step);
    api.el.__resize=function(){var w=ball?{x:ball.x/W,y:ball.y/H}:null;size();if(w&&ball){ball.x=w.x*W;ball.y=w.y*H;}};
    api.el.__cleanup=function(){cancelAnimationFrame(raf);};
  }

  /* ===================== RECETTES ===================== */
  /* 👉 HÉLÈNE : mets tes recettes fav ici (window.HELENE_RECETTES) */
  var RECIPES=[
    {e:'🍋',n:'Pâtes au citron',d:'Citron, parmesan, un peu de crème. Le réconfort express.',m:'15 min · facile'},
    {e:'🍳',n:'Shakshuka',d:'Oeufs pochés dans une sauce tomate épicée. Brunch parfait.',m:'25 min · facile'},
    {e:'🍜',n:'Ramen maison',d:'Bouillon miso, oeuf mollet, nouilles. Câlin dans un bol.',m:'40 min · moyen'},
    {e:'🥘',n:'Risotto champignons',d:'Patience et louche par louche. Crémeux garanti.',m:'35 min · moyen'},
    {e:'🌮',n:'Tacos al pastor',d:'Porc mariné, ananas, coriandre. Soirée garantie.',m:'30 min · moyen'},
    {e:'🍰',n:'Gâteau au yaourt',d:'Le classique sans balance. Le pot de yaourt comme mesure.',m:'45 min · facile'},
    {e:'🥗',n:'Buddha bowl',d:'Quinoa, avocat, pois chiches rôtis, sauce tahini.',m:'20 min · facile'}
  ];
  window.HELENE_RECETTES=RECIPES;
  function buildRecettes(api){
    var body=api.body,last=-1;
    body.innerHTML='<div class="swr-card"><div class="swr-e"></div><div class="swr-n"></div><div class="swr-d"></div><div class="swr-meta"></div><button class="swr-btn">🎲 Une autre</button></div>';
    var e=body.querySelector('.swr-e'),n=body.querySelector('.swr-n'),d=body.querySelector('.swr-d'),m=body.querySelector('.swr-meta');
    function pick(){var R=window.HELENE_RECETTES||RECIPES,i;do{i=Math.floor(Math.random()*R.length);}while(R.length>1&&i===last);last=i;var r=R[i];e.textContent=r.e;n.textContent=r.n;d.textContent=r.d;m.textContent='⏱ '+r.m;}
    body.querySelector('.swr-btn').onclick=pick;pick();
  }

  /* ===================== DOCK ===================== */
  var dock=el('div','sw-dock');
  function addBtn(key,icon,label,fn){var b=el('button');b.textContent=icon;b.title=label;b.dataset.k=key;b.onclick=fn;dock.appendChild(b);}
  addBtn('music','🎵','Player musique',function(){makeWin('music','🎵','Player musique',buildMusic,{w:300,lw:380});});
  addBtn('tennis','🎾','Mini tennis',function(){makeWin('tennis','🎾','Mini tennis',buildTennis,{w:300,lw:460});});
  addBtn('reci','🍳','Recettes',function(){makeWin('reci','🍳','Recette surprise',buildRecettes,{w:300,lw:360});});
  document.body.appendChild(dock);
  function syncDock(){[].forEach.call(dock.children,function(b){b.classList.toggle('on',!!openWins[b.dataset.k]);});}
  window.__sw_syncDock=syncDock;
})();

})();
</script>
